{{- $src := .Destination -}}
{{- $alt := .Text -}}
{{- $image := .Page.Resources.GetMatch $src -}}

{{- if $image -}}
  {{/* Page Bundle 资源：走主题原有的响应式处理 */}}
  {{- $small := $image.Resize "480x" -}}
  {{- $big := $image.Resize "1024x" -}}
  <img
    src="{{ $big.RelPermalink }}"
    srcset="{{ $small.RelPermalink }} 480w, {{ $big.RelPermalink }} 1024w"
    alt="{{ $alt }}"
    loading="lazy"
    sizes="(max-width: 767px) calc(100vw - 30px), (max-width: 1023px) 700px, 1232px"
  />
{{- else -}}
  {{/* Fallback：static 目录或外部链接，直接输出 src */}}
  <img src="{{ $src | safeURL }}" alt="{{ $alt }}" loading="lazy" />
{{- end -}}
